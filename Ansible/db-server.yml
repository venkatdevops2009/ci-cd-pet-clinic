# db-server.yml
- hosts: db_server
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3   # force Ansible to use Python 3
  tasks:
    - name: Install MySQL
      yum:
        name: mysql-server
        state: present

    - name: Start MySQL
      service:
        name: mysqld
        state: started
        enabled: yes

    - name: Install Python3 and pip
      yum:
        name: python3-pip
        state: present

    - name: Install PyMySQL library
      pip:
        name: PyMySQL
        executable: pip3

    - name: Create PetClinic database
      mysql_db:
        name: petclinic
        state: present

    - name: Create PetClinic user
      mysql_user:
        name: petclinic_user
        password: yourpassword
        priv: "petclinic.*:ALL"
        host: "%"
        state: present
