# java-server.yml
- hosts: java_server
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3
    db_host: "{{ groups['db_server'][0] }}"
    db_name: petclinic
    db_user: petclinic_user
    db_password: yourpassword

  tasks:
    - name: Install Java
      dnf:
        name: java-17-openjdk
        state: present

    - name: Install Maven
      dnf:
        name: maven
        state: present

    - name: Install Git
      dnf:
        name: git
        state: present

    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Remove old PetClinic repo if exists
      file:
        path: /opt/petclinic
        state: absent

    - name: Clone PetClinic repo fresh
      git:
        repo: https://github.com/venkatdevops2009/pet-clinic-app.git
        dest: /opt/petclinic
        version: main

    - name: Update application.properties with DB connection
      blockinfile:
        path: /opt/petclinic/src/main/resources/application-aws.yml
        block: |
          spring.datasource.url=jdbc:mysql://{{ db_host }}:3306/{{ db_name }}?useSSL=false&allowPublicKeyRetrieval=true
          spring.datasource.username={{ db_user }}
          spring.datasource.password={{ db_password }}
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
          server.port=8080

    - name: Build JAR with Maven
      command: mvn clean package -DskipTests
      args:
        chdir: /opt/petclinic

    - name: Create systemd service for PetClinic
      copy:
        dest: /etc/systemd/system/petclinic.service
        content: |
          [Unit]
          Description=PetClinic Spring Boot Application
          After=network.target

          [Service]
          User=ec2-user
          ExecStart=/usr/bin/java -jar /opt/petclinic/target/petclinic-*.jar
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and start PetClinic
      systemd:
        name: petclinic
        state: started
        enabled: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/conf.d/petclinic.conf
        content: |
          server {
              listen 80;
              server_name _;
              location / {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted

    - name: Wait for PetClinic to be ready
      uri:
        url: http://localhost/
        status_code: 200
      register: result
      retries: 6          # retry up to 6 times
      delay: 10           # wait 10 seconds between retries
      until: result.status == 200

    - name: Show health check result
      debug:
        msg: "PetClinic health check returned status {{ result.status }}"
